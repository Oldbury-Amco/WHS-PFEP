<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WHS PFEP Master</title>
  <style>
    :root{--ink:#18232f;--muted:#5e6b78;--line:#d9e1e8;--soft:#f4f7fa;--panel:#fff;--whs:#0f78a0;--whs-dark:#075779;--red:#c9252d;--green:#1d8a5f;--amber:#c98618;--shadow:0 10px 28px rgba(24,35,47,.08)}
    *{box-sizing:border-box}body{margin:0;font-family:Aptos,"Segoe UI",Arial,sans-serif;background:#eef3f7;color:var(--ink)}
    header{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;box-shadow:0 2px 14px rgba(24,35,47,.06)}
    .topbar{height:82px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;gap:22px}.brand{display:flex;align-items:center;gap:18px;min-width:0}.brand img.whs{height:58px;width:auto;object-fit:contain}.brand img.amco{height:34px;width:auto;object-fit:contain}.divider{height:42px;width:1px;background:var(--line)}
    .title{min-width:0}.title h1{font-size:20px;line-height:1.1;margin:0;font-weight:800;letter-spacing:.01em}.title p{margin:5px 0 0;color:var(--muted);font-size:12px}.actions{display:flex;align-items:center;gap:10px;white-space:nowrap}.btn{border:1px solid var(--whs);background:var(--whs);color:#fff;text-decoration:none;border-radius:6px;padding:10px 13px;font-weight:700;font-size:13px;cursor:pointer}.btn.secondary{background:#fff;color:var(--whs)}
    main{max-width:1600px;margin:0 auto;padding:22px 28px 40px}.kpis{display:grid;grid-template-columns:repeat(5,minmax(150px,1fr));gap:14px;margin-bottom:16px}.kpi{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:15px 16px;box-shadow:var(--shadow)}.kpi .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:800}.kpi .value{font-size:30px;font-weight:850;margin-top:7px;line-height:1}.kpi .sub{color:var(--muted);font-size:12px;margin-top:4px}
    .layout{display:grid;grid-template-columns:310px minmax(0,1fr);gap:16px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.filters{padding:16px;align-self:start;position:sticky;top:92px}.filters h2,.table-panel h2{font-size:14px;text-transform:uppercase;letter-spacing:.08em;margin:0 0 14px}.field{margin-bottom:12px}.field label{display:block;font-size:12px;color:var(--muted);font-weight:750;margin-bottom:5px}.field input,.field select{width:100%;height:36px;border:1px solid var(--line);border-radius:6px;background:#fff;padding:0 9px;color:var(--ink)}.filter-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.plant-buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}.plant-buttons button{height:36px;border:1px solid var(--line);background:#fff;border-radius:6px;font-weight:800;color:var(--ink);cursor:pointer}.plant-buttons button.active{border-color:var(--whs);background:#e9f6fb;color:var(--whs-dark)}
    .mini{margin-top:15px;border-top:1px solid var(--line);padding-top:14px}.mini-row{display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:6px 0;border-bottom:1px solid #edf1f4}.bar{height:8px;background:#e4ebf0;border-radius:999px;overflow:hidden;margin-top:5px}.bar span{height:100%;display:block;background:var(--green)}.bar.warn span{background:var(--amber)}
    .table-panel{min-width:0}.table-head{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--line);gap:12px}.table-head h2{margin:0}.table-meta{color:var(--muted);font-size:12px}.table-wrap{height:650px;overflow:auto}.pfep-table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:12px}.pfep-table th{position:sticky;top:0;z-index:5;background:#f0f5f8;color:#344353;border-bottom:1px solid var(--line);font-size:11px;text-transform:uppercase;letter-spacing:.04em}.pfep-table th,.pfep-table td{padding:9px 10px;border-right:1px solid #e7edf2;border-bottom:1px solid #e7edf2;text-align:left;white-space:nowrap}.pfep-table tbody tr:nth-child(even){background:#fbfdfe}.pfep-table tbody tr:hover{background:#eaf6fb}.pfep-table .material{font-weight:800;color:var(--whs-dark)}.score{display:inline-flex;align-items:center;gap:6px}.dot{width:9px;height:9px;border-radius:50%;display:inline-block;background:var(--green)}.dot.amber{background:var(--amber)}.dot.red{background:var(--red)}.pager{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-top:1px solid var(--line);gap:12px}.pager .btn{padding:8px 11px}.muted{color:var(--muted)}
    @media(max-width:1050px){.layout{display:block}.filters{position:static;margin-bottom:16px}.kpis{grid-template-columns:1fr 1fr}.topbar{height:auto;align-items:flex-start;flex-direction:column;padding:16px}.actions{flex-wrap:wrap}.table-wrap{height:560px}}@media(max-width:620px){main{padding:14px}.kpis{grid-template-columns:1fr}.brand{flex-wrap:wrap}.divider{display:none}}
  </style>
</head>
<body>
<header>
  <div class="topbar">
    <div class="brand">
      <img class="whs" src="assets/whs-plastics-logo.png" alt="WHS Plastics">
      <div class="divider"></div>
      <img class="amco" src="amco-logo.png" alt="AMCO">
      <div class="title"><h1>WHS PFEP Master</h1></div>
    </div>
    <div class="actions">
      <button class="btn secondary" id="resetBtn">Reset filters</button>
      <button class="btn secondary" id="csvBtn">Download filtered CSV</button>
      <button class="btn secondary" id="fullCsvBtn">Download static PFEP CSV</button><a class="btn" href="downloads/PFEP_Master_Static.xlsx">Download static PFEP Excel</a>
    </div>
  </div>
</header>
<main>
  <section class="kpis">
    <div class="kpi"><div class="label">Records</div><div class="value" id="kpiRecords">-</div><div class="sub">material-plant rows</div></div>
    <div class="kpi"><div class="label">Visible</div><div class="value" id="kpiVisible">-</div><div class="sub">after filters</div></div>
    <div class="kpi"><div class="label">Plants</div><div class="value" id="kpiPlants">-</div><div class="sub">in current data</div></div>
    <div class="kpi"><div class="label">Avg Completeness</div><div class="value" id="kpiComplete">-</div><div class="sub">key PFEP fields</div></div>
    <div class="kpi"><div class="label">Generated</div><div class="value" id="kpiGenerated" style="font-size:20px">-</div><div class="sub">latest static extract</div></div>
  </section>
  <div class="layout">
    <aside class="panel filters">
      <h2>Filters</h2>
      <div class="field"><label>Search material, description, supplier</label><input id="search" placeholder="Type to search"></div>
      <div class="field"><label>Plant</label><div class="plant-buttons" id="plantButtons"></div></div>
      <div class="field"><label>Material Type</label><select id="matType"><option value="">All material types</option></select></div>
      <div class="field"><label>Material Group</label><select id="matGroup"><option value="">All material groups</option></select></div>
      <div class="field"><label>Supplier</label><select id="supplier"><option value="">All suppliers</option></select></div>
      <div class="filter-row"><div class="field"><label>Min completeness</label><select id="minComp"><option value="0">Any</option><option value=".25">25%</option><option value=".5">50%</option><option value=".75">75%</option><option value=".9">90%</option></select></div><div class="field"><label>Rows/page</label><select id="pageSize"><option>100</option><option selected>250</option><option>500</option><option>1000</option></select></div></div>
      <div class="mini"><h2>Plant Summary</h2><div id="plantSummary"></div></div>
      <div class="mini"><h2>Largest Gaps</h2><div id="gapSummary"></div></div>
    </aside>
    <section class="panel table-panel">
      <div class="table-head"><h2>PFEP Master Table</h2><div class="table-meta" id="tableMeta">Loading data...</div></div>
      <div class="table-wrap"><table class="pfep-table"><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
      <div class="pager"><div><button class="btn secondary" id="prevBtn">Previous</button> <button class="btn secondary" id="nextBtn">Next</button></div><div class="muted" id="pageInfo"></div></div>
    </section>
  </div>
</main>
<script>
const state={meta:null,recordsByPlant:{},filtered:[],page:1,plant:'4123'};
const fmt=new Intl.NumberFormat('en-GB');
const cols=['Material','Plant','Part Description','Material Type Display','Material Group Display','Base UoM','MRP Type','Procurement type','Storage Locations','Vendor','Supplier Name','Procurement Plant','Safety stock','Reorder Point','Packaging Type','Container Qty','Replenishment Method','PFEP Owner','_Completeness'];
const el=id=>document.getElementById(id);
const esc=v=>String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function pct(v){return `${Math.round((Number(v)||0)*100)}%`}
function dot(v){v=Number(v)||0; return `<span class="dot ${v<.5?'red':v<.75?'amber':''}"></span>${pct(v)}`}
async function init(){
  const res=await fetch(`data/pfep_meta.json?ts=${Date.now()}`,{cache:'no-store'});
  if(!res.ok) throw new Error(`PFEP metadata not found: ${res.status}`);
  state.meta=await res.json();
  hydrateMeta();
  await selectPlant('4123');
}
function hydrateMeta(){
  const d=state.meta;
  el('kpiRecords').textContent=fmt.format(d.total_records);
  el('kpiPlants').textContent=d.plants.length;
  el('kpiGenerated').textContent=d.generated_at;
  el('plantButtons').innerHTML=['',...d.plants].map(p=>`<button data-plant="${esc(p)}" class="${p===state.plant?'active':''}">${p||'All'}</button>`).join('');
  el('plantButtons').onclick=e=>{if(e.target.tagName==='BUTTON') selectPlant(e.target.dataset.plant)};
  fillSelect('matType',d.material_type_options || d.material_types); fillSelect('matGroup',d.material_group_options || d.material_groups); fillSelect('supplier',d.suppliers);
  el('plantSummary').innerHTML=d.plant_summary.map(p=>`<div class="mini-row"><span>${p.Plant}</span><strong>${fmt.format(p.Records)}</strong></div><div class="bar"><span style="width:${Math.round(p.Completeness*100)}%"></span></div>`).join('');
  el('gapSummary').innerHTML=d.field_gaps.map(g=>`<div class="mini-row"><span>${esc(g.Field)}</span><strong>${fmt.format(g.Missing)}</strong></div><div class="bar warn"><span style="width:${Math.round(g.Completeness*100)}%"></span></div>`).join('');
  ['search','matType','matGroup','supplier','minComp','pageSize'].forEach(id=>el(id).addEventListener('input',()=>{state.page=1;applyFilters();}));
  el('resetBtn').onclick=reset; el('prevBtn').onclick=()=>{if(state.page>1){state.page--;render();}}; el('nextBtn').onclick=()=>{const pages=Math.ceil(state.filtered.length/Number(el('pageSize').value)); if(state.page<pages){state.page++;render();}}; el('csvBtn').onclick=downloadCsv; el('fullCsvBtn').onclick=downloadFullCsv;
}
async function loadPlant(plant){
  if(state.recordsByPlant[plant]) return state.recordsByPlant[plant];
  const file=state.meta.plant_files[plant];
  const res=await fetch(`${file}?ts=${Date.now()}`,{cache:'no-store'});
  if(!res.ok) throw new Error(`PFEP plant data not found for ${plant}: ${res.status}`);
  const data=await res.json();
  state.recordsByPlant[plant]=data.records || [];
  return state.recordsByPlant[plant];
}
async function selectPlant(plant){
  state.plant=plant; state.page=1;
  [...el('plantButtons').children].forEach(b=>b.classList.toggle('active',b.dataset.plant===plant));
  el('tableMeta').textContent=plant?`Loading plant ${plant}...`:'Loading all plants...';
  if(plant){await loadPlant(plant);} else {for(const p of state.meta.plants) await loadPlant(p);}
  applyFilters();
}
function activeRecords(){return state.plant ? (state.recordsByPlant[state.plant]||[]) : state.meta.plants.flatMap(p=>state.recordsByPlant[p]||[])}
function fillSelect(id,items){const s=el(id); items.forEach(x=>{const o=document.createElement('option'); o.value=x.code ?? x; o.textContent=x.label ?? x; s.appendChild(o);});}
function applyFilters(){const q=el('search').value.trim().toLowerCase(), mt=el('matType').value, mg=el('matGroup').value, sup=el('supplier').value, min=Number(el('minComp').value); state.filtered=activeRecords().filter(r=>{if(mt&&r['Material Type']!==mt)return false; if(mg&&r['Material Group']!==mg)return false; if(sup&&r['Supplier Name']!==sup)return false; if(Number(r._Completeness||0)<min)return false; if(q){const hay=[r.Material,r['Part Description'],r['Supplier Name'],r['Material Type'],r['Material Type Description'],r['Material Group'],r['Material Group Description']].join(' ').toLowerCase(); if(!hay.includes(q))return false;} return true;}); render();}
function displayValue(r,c){if(c==='Material Type Display') return [r['Material Type'],r['Material Type Description']].filter(Boolean).join(' - '); if(c==='Material Group Display') return [r['Material Group'],r['Material Group Description']].filter(Boolean).join(' - '); return r[c];}
function displayHeader(c){return c==='Material Type Display'?'Material Type':c==='Material Group Display'?'Material Group':c==='_Completeness'?'Completeness':c}
function render(){const size=Number(el('pageSize').value), start=(state.page-1)*size, rows=state.filtered.slice(start,start+size), pages=Math.max(1,Math.ceil(state.filtered.length/size)); const avg=state.filtered.reduce((s,r)=>s+Number(r._Completeness||0),0)/(state.filtered.length||1); el('kpiVisible').textContent=fmt.format(state.filtered.length); el('kpiComplete').textContent=pct(avg); el('tableMeta').textContent=`Showing ${state.filtered.length?fmt.format(start+1):0}-${fmt.format(Math.min(start+size,state.filtered.length))} of ${fmt.format(state.filtered.length)}`; el('pageInfo').textContent=`Page ${state.page} of ${pages}`; el('thead').innerHTML='<tr>'+cols.map(c=>`<th>${esc(displayHeader(c))}</th>`).join('')+'</tr>'; el('tbody').innerHTML=rows.map(r=>'<tr>'+cols.map(c=>`<td class="${c==='Material'?'material':''}">${c==='_Completeness'?'<span class="score">'+dot(r[c])+'</span>':esc(displayValue(r,c))}</td>`).join('')+'</tr>').join('');}
function reset(){['search','matType','matGroup','supplier'].forEach(id=>el(id).value=''); el('minComp').value='0'; state.page=1; selectPlant('4123');}
function csvEscape(v){return `"${String(v??'').replace(/"/g,'""')}"`}
function downloadCsv(){const fields=cols.filter(c=>c!=='_Completeness'); const header=fields.map(displayHeader).concat(['Completeness']); const lines=[header.map(csvEscape).join(',')].concat(state.filtered.map(r=>fields.map(c=>csvEscape(displayValue(r,c))).concat(csvEscape(pct(r._Completeness))).join(','))); saveCsv(lines,'PFEP_Filtered_View.csv');}
async function downloadFullCsv(){for(const p of state.meta.plants) await loadPlant(p); const all=state.meta.plants.flatMap(p=>state.recordsByPlant[p]||[]); const header=state.meta.columns; const lines=[header.map(csvEscape).join(',')].concat(all.map(r=>header.map(h=>csvEscape(r[h])).join(','))); saveCsv(lines,'PFEP_Master_Static.csv');}
function saveCsv(lines,name){const blob=new Blob([lines.join('\n')],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href);}
init().catch(e=>{el('tableMeta').textContent=`Unable to load PFEP data: ${e.message}`; console.error(e);});
</script>
</body>
</html>
